<html>
    <head>
        <title>Simple Layouts</title>
        <style>
            body{
                background-color: blanchedalmond;
                display: flex;
                margin: 0;
                justify-content: center;
                align-items: center;
                border:10px solid black;
            }
            h1{
                font-family: Edu VIC WA NT hand;
                text-decoration: underline;

            }
            .container{
                background-color: hotpink;
                margin: 10px;
                padding: 20px 30px;
                flex-direction: column;
                justify-content: center;
                display: flex;
                align-items: center;
                border-radius: 25px;
                font-family:JetBrains Mono ;
                border:4px solid black;
            }
            .display{
                background-color: white;
                padding: 5 60px ;
                border-radius: 20px;
                border:3px solid black;

            }
            .container:hover{
                background-color: blueviolet;
            }
            .btn{
                display: flex;
                margin: 10px;
                padding: 10px;
            }
            .btn button{
                font-size: 20px;
                border: 2px solid black;
                background-color: white;
                cursor: pointer;
                border-radius: 10px;    
            }
            button:hover{
                background-color: black;
                color: white;
                border: 3px solid white;
            }

        </style>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Edu+VIC+WA+NT+Hand:wght@400..700&family=Geist+Pixel:ELSH@37.6&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Edu+VIC+WA+NT+Hand:wght@400..700&family=Geist+Pixel:ELSH@37.6&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="container">
        <h1> RANDOM   QUOTE   GENRATOR ☺️</h1>
            <div class="display">
                Your Generated Quote
            </div>
            <div class="btn">
                <button id="generateBtn">Generate</button>
            </div>
        </div>
    </body>
    <script>
        const quotes = [
            "The only limit to our realization of tomorrow is our doubts of today. - Franklin D. Roosevelt",
            "Life is what happens when you're busy making other plans. - John Lennon",
            "Do not watch the clock. Do what it does. Keep going. - Sam Levenson",
            "Keep your face always toward the sunshine—and shadows will fall behind you. - Walt Whitman",
            "The best way to predict the future is to invent it. - Alan Kay"
        ];
        const btn = document.getElementById('generateBtn');
        const display = document.querySelector('.display');
        function showRandomQuote(){
            const idx = Math.floor(Math.random() * quotes.length);
            display.textContent = quotes[idx];
        }
        btn.addEventListener('click', showRandomQuote);
        showRandomQuote();
    </script>
</html>
